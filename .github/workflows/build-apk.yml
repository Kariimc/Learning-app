name: Build Android APK

on:
  push:
    branches:
      - main
      - claude/fervent-sagan-noo8az
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch AI-generated assets (art, font, Mabel voice)
        # Pull the AI art, Fredoka font and Mabel voice pack into assets/ so
        # they get bundled into the APK. Runs on the host before the build;
        # the buildozer action mounts this workspace, so the files carry over.
        run: |
          python scripts/fetch_assets.py && echo "Assets fetched." \
            || echo "::warning::Some assets failed to download — app will use built-in placeholders."

      - name: Build debug APK
        # Runs buildozer inside the official kivy/buildozer Docker image, which
        # ships a pre-configured Android SDK + NDK with licenses already
        # accepted — avoiding the SDK bootstrap / license-prompt failures that
        # hit a bare runner.
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReadingLand-debug
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30
          if-no-files-found: error
